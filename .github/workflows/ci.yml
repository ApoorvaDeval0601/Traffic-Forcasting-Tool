name: CI/CD — ST-GNN Traffic

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python tests ─────────────────────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (CPU torch only for CI)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Lint
        run: |
          pip install ruff
          ruff check models/ api/ training/ evaluation/

  # ── Frontend build ────────────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

  # ── Docker build (on main only) ───────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t stgnn-api:latest .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t stgnn-frontend:latest ./frontend

      - name: Test docker-compose
        run: |
          # Smoke test compose file is valid
          docker-compose config

  # ── Deploy to Render (on main only, requires RENDER_DEPLOY_HOOK secret) ──
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -X POST "$RENDER_DEPLOY_HOOK"
