<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrafficGNN — LA Freeway Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:        #0a0e1a;
        --surface:   #111827;
        --surface2:  #1a2235;
        --border:    rgba(255,255,255,0.07);
        --border2:   rgba(255,255,255,0.12);
        --text:      #f0f4ff;
        --muted:     #6b7a99;
        --accent:    #6366f1;
        --accent2:   #818cf8;
        --green:     #10b981;
        --amber:     #f59e0b;
        --red:       #ef4444;
        --purple:    #a855f7;
        --sidebar-w: 230px;
        --font: 'Inter', sans-serif;
        --mono: 'JetBrains Mono', monospace;
      }

      html, body, #root { height: 100%; }
      body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; overflow: hidden; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

      /* App shell */
      .app-shell { display: flex; height: 100vh; }

      /* Sidebar */
      .sidebar {
        width: var(--sidebar-w);
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 0;
        flex-shrink: 0;
      }

      .sidebar-logo {
        padding: 22px 20px 18px;
        border-bottom: 1px solid var(--border);
      }

      .logo-mark {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }

      .logo-icon {
        width: 28px; height: 28px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
      }

      .logo-name {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.3px;
        color: var(--text);
      }

      .logo-sub {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-top: 2px;
        padding-left: 38px;
      }

      .sidebar-nav {
        flex: 1;
        padding: 12px 10px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .nav-section-label {
        font-size: 10px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 8px 10px 4px;
        margin-top: 4px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        font-family: var(--font);
        transition: all 0.15s;
        text-align: left;
        width: 100%;
        position: relative;
      }

      .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }

      .nav-item.active {
        background: rgba(99,102,241,0.12);
        color: var(--accent2);
      }

      .nav-item.active::before {
        content: '';
        position: absolute;
        left: 0; top: 6px; bottom: 6px;
        width: 2px;
        background: var(--accent);
        border-radius: 0 2px 2px 0;
      }

      .nav-icon { font-size: 15px; width: 18px; text-align: center; }

      .sidebar-footer {
        padding: 14px 16px;
        border-top: 1px solid var(--border);
      }

      .api-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--muted);
      }

      .api-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }

      .api-dot.ready  { background: var(--green); box-shadow: 0 0 6px var(--green); }
      .api-dot.offline { background: var(--red); }
      .api-dot.checking { background: var(--amber); animation: pulse 1.2s infinite; }

      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

      /* Content */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 28px 32px;
        min-width: 0;
      }

      /* Page header */
      .page-header { margin-bottom: 24px; }
      .page-header h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.5px;
        color: var(--text);
        margin-bottom: 4px;
      }
      .page-header .subtitle { font-size: 13px; color: var(--muted); }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px 20px;
      }

      .card-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      /* Metric grid */
      .metric-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }

      .metric-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        transition: border-color 0.2s;
      }

      .metric-card:hover { border-color: var(--border2); }
      .metric-card.highlight { border-color: rgba(99,102,241,0.3); }

      .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); }
      .metric-value { font-size: 26px; font-weight: 600; letter-spacing: -1px; line-height: 1; font-family: var(--mono); }
      .metric-sub   { font-size: 10px; color: var(--muted); }

      /* Chart section */
      .chart-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .chart-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .chart-controls label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

      select {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 7px;
        padding: 6px 10px;
        font-size: 13px;
        font-family: var(--font);
        color: var(--text);
        cursor: pointer;
        outline: none;
      }

      select:focus { border-color: var(--accent); }

      /* Buttons */
      .btn {
        padding: 7px 16px;
        border-radius: 7px;
        border: 1px solid var(--border2);
        background: var(--surface2);
        color: var(--text);
        cursor: pointer;
        font-size: 13px;
        font-family: var(--font);
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn:hover { background: var(--surface); border-color: rgba(255,255,255,0.2); }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

      .btn-danger {
        background: rgba(239,68,68,0.15);
        border-color: rgba(239,68,68,0.3);
        color: var(--red);
      }

      .btn-danger:hover { background: rgba(239,68,68,0.25); }

      .btn-success {
        background: rgba(16,185,129,0.15);
        border-color: rgba(16,185,129,0.3);
        color: var(--green);
      }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 500;
      }

      /* Table */
      .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .data-table th {
        padding: 8px 12px;
        text-align: left;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        font-weight: 500;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
      .data-table tr:last-child td { border-bottom: none; }
      .data-table tr:hover td { background: rgba(255,255,255,0.02); }
      .data-table .better { color: var(--green); font-weight: 500; }
      .data-table .improvement { color: var(--accent2); font-weight: 500; }

      /* Map page */
      .map-page .page-header { margin-bottom: 16px; }
      .map-layout { display: flex; gap: 14px; height: calc(100vh - 140px); }
      .map-controls {
        width: 220px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
      }

      .legend { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
      .legend h4 { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 10px; }
      .legend-item { display: flex; flex-direction: column; gap: 2px; padding: 5px 0; border-bottom: 1px solid var(--border); }
      .legend-item:last-child { border-bottom: none; }
      .legend-row { display: flex; align-items: center; gap: 8px; }
      .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .legend-name { flex: 1; font-size: 12px; }
      .legend-count { font-size: 12px; font-weight: 600; font-family: var(--mono); }
      .legend-desc { font-size: 10px; color: var(--muted); padding-left: 16px; }

      .sensor-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sensor-panel h4 { font-size: 13px; font-weight: 600; }

      .forecast-bars { display: flex; align-items: flex-end; gap: 2px; height: 56px; }
      .forecast-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
      .forecast-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 3px; }
      .bar-label { font-size: 8px; color: var(--muted); }

      /* Compare page */
      .compare-summary { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
      .summary-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
      .summary-card.transformer { border-color: rgba(99,102,241,0.3); }
      .summary-card.lstm { border-color: rgba(245,158,11,0.25); }
      .model-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
      .transformer-badge { background: rgba(99,102,241,0.15); color: var(--accent2); }
      .lstm-badge { background: rgba(245,158,11,0.15); color: var(--amber); }
      .summary-stat { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
      .summary-stat:last-child { border-bottom: none; }
      .stat-label { color: var(--muted); }
      .stat-value { font-weight: 500; font-family: var(--mono); }
      .improvement-badge { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px; min-width: 90px; }
      .imp-arrow { font-size: 22px; }
      .imp-value { font-size: 22px; font-weight: 700; font-family: var(--mono); }
      .imp-label { font-size: 10px; color: var(--muted); text-align: center; }
      .metric-selector { display: flex; gap: 6px; margin-bottom: 18px; }
      .metric-btn { padding: 6px 16px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--muted); transition: all 0.15s; font-family: var(--font); }
      .metric-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
      .metric-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
      .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
      .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
      .chart-card h3 { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 14px; }
      .findings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .finding-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
      .finding-icon { font-size: 18px; display: block; margin-bottom: 8px; }
      .finding-card h4 { font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
      .finding-card p { font-size: 11px; color: var(--muted); line-height: 1.6; }

      /* Attention page */
      .attention-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
      .attention-layout { display: flex; gap: 20px; align-items: flex-start; }
      .attention-canvas { border: 1px solid var(--border); border-radius: 12px; background: var(--surface); }
      .attention-table { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
      .attention-table h3 { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 14px; }
      .weight-bar { height: 5px; border-radius: 3px; }
      .attention-insight { padding: 10px 12px; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 8px; font-size: 11px; color: var(--accent2); line-height: 1.5; margin-top: 12px; }

      input[type="number"] {
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: 7px;
        padding: 7px 10px;
        font-size: 13px;
        color: var(--text);
        font-family: var(--mono);
        outline: none;
        width: 80px;
      }
      input[type="number"]:focus { border-color: var(--accent); }

      .loading-text { color: var(--muted); text-align: center; padding: 60px; font-size: 13px; }
      .error-text { color: var(--red); padding: 20px; font-size: 13px; }

      .comparison-table-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
      .comparison-table-section h2 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
