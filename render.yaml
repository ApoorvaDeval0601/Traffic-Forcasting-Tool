# render.yaml — Render.com deployment configuration
# Deploy at: https://dashboard.render.com/blueprints → "New Blueprint"

services:
  # FastAPI backend
  - type: web
    name: stgnn-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: checkpoints/stgnn_metrla/best_model.pt
      - key: DATA_DIR
        value: data
      - key: DATASET
        value: metr-la
    disk:
      name: stgnn-data
      mountPath: /opt/render/project/src/data
      sizeGB: 2
    plan: free   # Upgrade to starter for persistent disk + no sleep

  # React frontend (static site — free, no sleep)
  - type: web
    name: stgnn-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # Update this to your Render API URL after first deploy
        value: https://stgnn-api.onrender.com
