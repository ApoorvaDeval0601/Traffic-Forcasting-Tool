services:
  - type: web
    name: stgnn-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash startup.sh
    envVars:
      - key: MODEL_PATH
        value: checkpoints/stgnn_metr_la/best_model.pt
      - key: DATA_DIR
        value: data
      - key: DATASET
        value: metr-la
      - key: HF_TOKEN
        sync: false

  - type: web
    name: stgnn-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://stgnn-api.onrender.com